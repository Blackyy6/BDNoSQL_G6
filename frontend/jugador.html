<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Jugadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <h1 class="mb-4">Jugadores</h1>

  <!-- Formulario -->
  <form id="jugadorForm" class="mb-4">
    <input type="hidden" id="jugadorId">
    <div class="mb-2">
      <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
    </div>
    <div class="mb-2">
      <input type="date" id="fecha_nacimiento" class="form-control" placeholder="Fecha de nacimiento" required>
    </div>
    <div class="mb-2">
      <input type="number" id="edad" class="form-control" placeholder="Edad" required>
    </div>
    <div class="mb-2">
      <input type="text" id="posicion" class="form-control" placeholder="Posición" required>
    </div>
    <div class="mb-2">
      <input type="text" id="estado_salud" class="form-control" placeholder="Estado de salud" required>
    </div>
    <div class="mb-2">
      <input type="text" id="contacto_nombre" class="form-control" placeholder="Nombre contacto emergencia" required>
    </div>
    <div class="mb-2">
      <input type="text" id="contacto_telefono" class="form-control" placeholder="Teléfono contacto emergencia" required>
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>

  <!-- Tabla -->
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Posición</th>
        <th>Estado salud</th>
        <th>Contacto emergencia</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaJugadores"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
